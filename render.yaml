services:
  - type: web
    name: starstruck-gallery
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: node render-server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
    healthCheckPath: /
    autoDeploy: true
